<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免费古籍文本比对系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <header class="text-center mb-5">
            <h1 class="display-4">📜 古籍文本比对系统</h1>
            <p class="lead">免费、简单、高效的古籍数字化工具</p>
        </header>

        <div class="row">
            <!-- 左侧：上传和OCR -->
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>第一步：上传古籍图片</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">版本A：</label>
                            <input type="file" class="form-control" id="fileA" accept="image/*">
                            <div class="form-text">支持JPG、PNG格式，建议图片清晰</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">版本B：</label>
                            <input type="file" class="form-control" id="fileB" accept="image/*">
                        </div>
                        <button class="btn btn-primary w-100" onclick="processImages()">
                            🪄 开始识别文字
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>或直接输入文本</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">版本A文本：</label>
                            <textarea class="form-control" id="textA" rows="5" placeholder="粘贴或输入第一版文本..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">版本B文本：</label>
                            <textarea class="form-control" id="textB" rows="5" placeholder="粘贴或输入第二版文本..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：比对结果 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>第二步：文本比对结果</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-success w-100 mb-3" onclick="compareTexts()">
                            🔍 开始比对
                        </button>
                        
                        <div class="result-area">
                            <h6>比对结果：</h6>
                            <div id="comparisonResult" class="p-3 border rounded">
                                <p class="text-muted">这里将显示文本比对结果...</p>
                            </div>
                            
                            <div class="mt-3">
                                <h6>统计信息：</h6>
                                <div id="stats" class="text-muted">
                                    等待比对...
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button class="btn btn-outline-secondary" onclick="exportText()">
                                📥 导出结果
                            </button>
                            <button class="btn btn-outline-secondary" onclick="clearAll()">
                                🗑️ 清空重来
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-5 text-center text-muted">
            <p>学生项目 · 完全免费 · 开源共享</p>
            <p>使用百度OCR API | 基于Diff Match Patch算法</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v2.1.5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
    <script src="script.js"></script>
</body>
</html>
<!-- 替换原来的上传部分 -->
<div class="card mb-4">
    <div class="card-header">
        <h5>第一步：上传古籍版本（支持2-5个版本）</h5>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label">选择比对版本数量：</label>
            <select class="form-select" id="versionCount" onchange="changeVersionCount()">
                <option value="2">2个版本</option>
                <option value="3">3个版本</option>
                <option value="4">4个版本</option>
                <option value="5">5个版本</option>
            </select>
        </div>
        
        <div id="versionContainer">
            <!-- 动态生成的版本输入区域 -->
        </div>
        
        <button class="btn btn-primary w-100 mt-3" onclick="processAllImages()">
            🪄 开始识别所有版本
        </button>
    </div>
</div>

<!-- 在script.js之前添加这个script -->
<script>
// 初始化版本输入区域
function initVersionContainer() {
    const container = document.getElementById('versionContainer');
    container.innerHTML = '';
    
    const count = parseInt(document.getElementById('versionCount').value);
    
    for (let i = 1; i <= count; i++) {
        container.innerHTML += `
            <div class="version-item mb-3">
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">版本 ${i} 图片：</label>
                        <input type="file" class="form-control version-file" 
                               data-version="${i}" accept="image/*">
                        <div class="form-text">支持JPG、PNG格式</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">或直接输入文本：</label>
                        <textarea class="form-control version-text" 
                                  data-version="${i}" rows="3" 
                                  placeholder="版本 ${i} 文本..."></textarea>
                    </div>
                </div>
                <div class="mt-2">
                    <small class="text-muted">
                        <span class="version-name">版本 ${i}</span>
                        <input type="text" class="form-control form-control-sm d-inline-block w-auto ms-2" 
                               placeholder="自定义名称（可选）" data-version="${i}">
                    </small>
                </div>
            </div>
        `;
    }
}

// 版本数量变化时重新生成
function changeVersionCount() {
    initVersionContainer();
}

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', initVersionContainer);
</script>
<div class="card mb-4">
    <div class="card-header">
        <h5>第二步：选择OCR识别引擎</h5>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <div class="form-check">
                <input class="form-check-input" type="radio" name="ocrEngine" 
                       id="ocrTesseract" value="tesseract" checked>
                <label class="form-check-label" for="ocrTesseract">
                    <strong>Tesseract.js（免费）</strong>
                    <small class="text-muted d-block">本地识别，无需网络，速度较慢</small>
                </label>
            </div>
            
            <div class="form-check">
                <input class="form-check-input" type="radio" name="ocrEngine" 
                       id="ocrBaidu" value="baidu">
                <label class="form-check-label" for="ocrBaidu">
                    <strong>百度OCR API（需配置）</strong>
                    <small class="text-muted d-block">识别准确率高，需要API Key</small>
                </label>
            </div>
            
            <div class="form-check">
                <input class="form-check-input" type="radio" name="ocrEngine" 
                       id="ocrTencent" value="tencent">
                <label class="form-check-label" for="ocrTencent">
                    <strong>腾讯OCR API（需配置）</strong>
                    <small class="text-muted d-block">支持古籍字体，需要API Key</small>
                </label>
            </div>
        </div>
        
        <!-- API配置区域（默认隐藏） -->
        <div id="apiConfigArea" style="display: none;">
            <div class="border p-3 rounded">
                <h6>API配置</h6>
                
                <div id="baiduConfig" class="api-config">
                    <div class="mb-2">
                        <label class="form-label">百度API Key：</label>
                        <input type="text" class="form-control" id="baiduApiKey" 
                               placeholder="从百度AI平台获取">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">百度Secret Key：</label>
                        <input type="text" class="form-control" id="baiduSecretKey">
                    </div>
                    <button class="btn btn-sm btn-outline-primary" onclick="testBaiduAPI()">
                        测试连接
                    </button>
                </div>
                
                <div id="tencentConfig" class="api-config" style="display: none;">
                    <div class="mb-2">
                        <label class="form-label">腾讯SecretId：</label>
                        <input type="text" class="form-control" id="tencentSecretId">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">腾讯SecretKey：</label>
                        <input type="text" class="form-control" id="tencentSecretKey">
                    </div>
                    <button class="btn btn-sm btn-outline-primary" onclick="testTencentAPI()">
                        测试连接
                    </button>
                </div>
                
                <div class="mt-2">
                    <small class="text-muted">
                        🔑 如何获取API Key？
                        <a href="https://ai.baidu.com/tech/ocr" target="_blank">百度OCR</a> |
                        <a href="https://cloud.tencent.com/product/ocr" target="_blank">腾讯OCR</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
